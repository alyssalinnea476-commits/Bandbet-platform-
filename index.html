<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bet UI Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="logo">bk</div>

    <div class="auth-buttons">
      <button class="login">Login</button>
      <button class="join">Join now</button>
    </div>
  </header>

  <div class="tabs">
    <button class="active">Sports</button>
    <button>Top Events</button>
    <button>Multiple</button>
    <button>Bet Boost</button>
  </div>

  <section class="match-card">
    <div class="league">UEFA Europa League</div>

    <div class="teams">
      <span>Sport-Club Freiburg</span>
      <span>VS</span>
      <span>Aston Villa</span>
    </div>

    <div class="odds">
      <button>5.5</button>
      <button>4</button>
      <button>1.68</button>
    </div>
  </section>

  <section class="casino-section">
    <div class="section-header">
      <h2>Casino</h2>
      <button class="view-all">All</button>
    </div>

    <div class="games-grid">

      <div class="game-card red">
        <div class="game-image">✈</div>
        <h3>Aviator</h3>
        <p>192183 players</p>
      </div>

      <div class="game-card blue">
        <div class="game-image">🛩</div>
        <h3>TurboPlan</h3>
        <p>12091 players</p>
      </div>

      <div class="game-card green">
        <div class="game-image">💸</div>
        <h3>Snoop Dollar</h3>
        <p>16876 players</p>
      </div>

      <div class="game-card yellow">
        <div class="game-image">⚡</div>
        <h3>JetX</h3>
        <p>14271 players</p>
      </div>

    </div>
  </section>

  <nav class="bottom-nav">
    <button>Games</button>
    <button>Live Casino</button>
    <button>Sports</button>
    <button>Live</button>
    <button>Aviator</button>
    <button>Menu</button>
  </nav>

</body>
</html>
